apiVersion: v1
kind: ConfigMap
metadata:
  name: graph-alert-engine-runtime
  namespace: graph-foundry-system
  labels:
    app: graph-alert-engine
    managed-by: dashboard-bff
data:
  runtime.env: |
    GRAPH_TIMEOUT_MS=2000
    GRAPH_RETRY_MAX=2
    CENTRALITY_CACHE_TTL_MS=30000
    RISK_W1=1.0
    RISK_W2=1.0
    RISK_W3=1.0
    RISK_THRESHOLD=60.0
    # Set by engineer when Slack integration is ready:
    # SLACK_WEBHOOK_URL=https://hooks.slack.com/services/...
