apiVersion: v1
kind: ServiceAccount
metadata:
  name: alert-engine
  namespace: graph-foundry-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: alert-engine-secret-manager
  namespace: graph-foundry-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: alert-engine-secret-manager
  namespace: graph-foundry-system
subjects:
  - kind: ServiceAccount
    name: alert-engine
    namespace: graph-foundry-system
roleRef:
  kind: Role
  name: alert-engine-secret-manager
  apiGroup: rbac.authorization.k8s.io
