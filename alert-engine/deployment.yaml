apiVersion: apps/v1
kind: Deployment
metadata:
  name: graph-alert-engine
  namespace: graph-foundry-system
  labels:
    app: graph-alert-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: graph-alert-engine
  template:
    metadata:
      labels:
        app: graph-alert-engine
    spec:
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      serviceAccountName: alert-engine
      initContainers:
        - name: wait-for-graph-engine
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z service-graph-engine.graph-foundry-system.svc.cluster.local 3000; do echo "Waiting for service-graph-engine..."; sleep 5; done']
      containers:
        - name: alert-engine
          image: prashansamarathunge/graph-alert-engine:latest
          ports:
            - containerPort: 8002
          env:
            - name: GRAPH_BASE_URL
              value: "http://service-graph-engine.graph-foundry-system.svc.cluster.local:3000"
            - name: RISK_THRESHOLD
              value: "60.0"
            - name: WEBHOOK_TARGET_URLS
              value: "http://dashboard-bff.graph-foundry-system.svc.cluster.local:3001/ingest/webhook"
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: webhook-secrets
                  key: WEBHOOK_SECRET
            - name: CLUSTER_NAME
              value: "graph-foundry"
            - name: REGION
              value: "default"
            - name: ENVIRONMENT
              value: "production"
          volumeMounts:
            - name: runtime-config
              mountPath: /etc/runtime-config
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: runtime-config
          configMap:
            name: graph-alert-engine-runtime
