# Create these secrets before deploying:
#
#   kubectl create secret generic webhook-secrets \
#     --namespace graph-foundry-system \
#     --from-literal=WEBHOOK_SECRET='changeme'
#
# Or apply this file with placeholder values (CHANGE BEFORE PRODUCTION):
---
apiVersion: v1
kind: Secret
metadata:
  name: webhook-secrets
  namespace: graph-foundry-system
type: Opaque
stringData:
  WEBHOOK_SECRET: "changeme"

