apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-nginx-config
  namespace: graph-foundry-system
  labels:
    app: integrated-dashboard
data:
  nginx.conf: |
    user  nginx;
    worker_processes  auto;

    error_log  /var/log/nginx/error.log warn;
    pid        /var/run/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;

        log_format main '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent"';

        access_log /var/log/nginx/access.log main;

        sendfile        on;
        tcp_nopush      on;
        tcp_nodelay     on;
        keepalive_timeout 65;
        types_hash_max_size 2048;
        client_max_body_size 10m;

        # ── Gzip ─────────────────────────────────────────────────────────────
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types
            text/plain
            text/css
            text/xml
            text/javascript
            application/json
            application/javascript
            application/xml
            application/rss+xml
            image/svg+xml;

        # ── Upstream: BFF service (k8s service name) ─────────────────────────
        upstream bff_backend {
            server dashboard-bff.graph-foundry-system.svc.cluster.local:3001;
        }

        server {
            listen 80;
            server_name _;

            root /usr/share/nginx/html;
            index index.html;

            # ── Security headers ─────────────────────────────────────────────
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;

            # ── Static asset caching (Vite hashed filenames) ─────────────────
            location /assets/ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }

            # ── BFF API proxy ────────────────────────────────────────────────
            location /api/ {
                proxy_pass http://bff_backend;
                proxy_http_version 1.1;
                proxy_set_header Host              $host;
                proxy_set_header X-Real-IP         $remote_addr;
                proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_read_timeout 30s;
            }

            # ── BFF webhook ingestion proxy ──────────────────────────────────
            location /ingest/ {
                proxy_pass http://bff_backend;
                proxy_http_version 1.1;
                proxy_set_header Host              $host;
                proxy_set_header X-Real-IP         $remote_addr;
                proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_read_timeout 30s;
            }

            # ── BFF graph webhook proxy ──────────────────────────────────────
            location /webhook/ {
                proxy_pass http://bff_backend;
                proxy_http_version 1.1;
                proxy_set_header Host              $host;
                proxy_set_header X-Real-IP         $remote_addr;
                proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_read_timeout 30s;
            }

            # ── BFF health endpoint (exact) ──────────────────────────────────
            location = /health {
                proxy_pass http://bff_backend;
                proxy_http_version 1.1;
                proxy_set_header Host              $host;
                proxy_set_header X-Real-IP         $remote_addr;
                proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            # ── WebSocket proxy ──────────────────────────────────────────────
            location /ws {
                proxy_pass http://bff_backend;
                proxy_http_version 1.1;
                proxy_set_header Upgrade    $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host              $host;
                proxy_set_header X-Real-IP         $remote_addr;
                proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_read_timeout 86400s;
                proxy_send_timeout 86400s;
            }

            # ── SPA fallback ─────────────────────────────────────────────────
            location / {
                try_files $uri $uri/ /index.html;
            }
        }
    }
