apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-bff
  namespace: graph-foundry-system
  labels:
    app: dashboard-bff
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-bff
  template:
    metadata:
      labels:
        app: dashboard-bff
    spec:
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      serviceAccountName: dashboard-bff
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: wait-for-graph-engine
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z service-graph-engine.graph-foundry-system.svc.cluster.local 3000; do echo "Waiting for service-graph-engine..."; sleep 5; done']
        - name: wait-for-analysis-engine
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z analysis-engine.graph-foundry-system.svc.cluster.local 7000; do echo "Waiting for analysis-engine..."; sleep 5; done']
      containers:
        - name: bff
          image: prashansamarathunge/integrated-dashboard-bff:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: GRAPH_HEALTH_URL
              value: "http://service-graph-engine.graph-foundry-system.svc.cluster.local:3000/graph/health"
            - name: PREDICTIVE_API_BASE_URL
              value: "http://analysis-engine.graph-foundry-system.svc.cluster.local:7000"
            - name: SCHEDULER_API_BASE_URL
              value: "http://best-node-selector.graph-foundry-system.svc.cluster.local:9000"
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: webhook-secrets
                  key: WEBHOOK_SECRET
          volumeMounts:
            - name: runtime-config
              mountPath: /etc/runtime-config
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: runtime-config
          configMap:
            name: dashboard-bff-runtime
