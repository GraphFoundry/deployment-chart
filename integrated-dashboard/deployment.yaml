apiVersion: apps/v1
kind: Deployment
metadata:
  name: integrated-dashboard
  namespace: graph-foundry-system
  labels:
    app: integrated-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: integrated-dashboard
  template:
    metadata:
      labels:
        app: integrated-dashboard
    spec:
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: wait-for-bff
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z dashboard-bff.graph-foundry-system.svc.cluster.local 3001; do echo "Waiting for BFF..."; sleep 5; done']
      containers:
        - name: frontend
          image: prashansamarathunge/integrated-dashboard-frontend:latest
          ports:
            - containerPort: 80
          env:
            - name: BFF_URL
              value: ""
            - name: ENABLE_GRAPH_DIRECT_FALLBACK
              value: "false"
            - name: GRAPH_CACHE_REFRESH_MS
              value: "5000"
            - name: ALLOW_DEMO_CONSTRAINT_OVERRIDE
              value: "false"
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: nginx-config
          configMap:
            name: dashboard-nginx-config
