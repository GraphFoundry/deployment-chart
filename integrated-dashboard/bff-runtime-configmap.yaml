apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-bff-runtime
  namespace: graph-foundry-system
  labels:
    app: integrated-dashboard-bff
    managed-by: dashboard-bff
data:
  runtime.env: |
    WEBHOOK_REPLAY_WINDOW_SEC=300
    WEBHOOK_DEDUPE_WINDOW_SEC=86400
    WEBHOOK_RATE_LIMIT_WINDOW_MS=60000
    WEBHOOK_RATE_LIMIT_MAX=120
    OPENAI_API_KEY=
    FITSMS_API_KEY=
    FITSMS_API_URL=https://app.fitsms.lk/api/v3/sms/send
