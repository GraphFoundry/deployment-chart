apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard-bff
  namespace: graph-foundry-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dashboard-bff
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dashboard-bff
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dashboard-bff
subjects:
  - kind: ServiceAccount
    name: dashboard-bff
    namespace: graph-foundry-system
