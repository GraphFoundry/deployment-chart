apiVersion: apps/v1
kind: Deployment
metadata:
  name: best-node-selector
  namespace: graph-foundry-system
  labels:
    app: best-node-selector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: best-node-selector
  template:
    metadata:
      labels:
        app: best-node-selector
    spec:
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      serviceAccountName: best-node-selector
      initContainers:
        - name: wait-for-graph-engine
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z service-graph-engine.graph-foundry-system.svc.cluster.local 3000; do echo "Waiting for service-graph-engine..."; sleep 5; done']
      containers:
        - name: best-node-selector
          image: prashansamarathunge/best-node-selector:latest
          ports:
            - containerPort: 9000
          env:
            - name: PORT
              value: "9000"
            - name: REDIS_ADDR
              value: "redis.graph-foundry-system.svc.cluster.local:6379"
            - name: METRICS_PROVIDER
              value: "http"
            - name: METRICS_BASE_URL
              value: "http://service-graph-engine.graph-foundry-system.svc.cluster.local:3000"
            - name: ENABLE_SCORE_UPDATE
              value: "true"
            - name: WATCH_NAMESPACES
              value: "default"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 20
